<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Career Skill Gap Analyzer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Career Skill Gap Analyzer</h1>
      <p class="login-subtitle">Sign in to continue</p>

      <!-- Error Messages -->
      <div id="error-message" class="error-message hidden"></div>
      <div id="success-message" class="success-message hidden"></div>

      <!-- Form -->
      <form id="login-form" class="login-form">
        <!-- Name Field -->
        <div class="form-group">
          <label for="username">Full Name *</label>
          <input 
            type="text" 
            id="username" 
            placeholder="Enter your full name" 
            required 
          />
          <span class="error-text" id="name-error"></span>
        </div>

        <!-- Mobile Number Field -->
        <div class="form-group">
          <label for="mobile">Mobile Number *</label>
          <input 
            type="tel" 
            id="mobile" 
            placeholder="10 digit mobile number" 
            maxlength="10" 
            required 
          />
          <span class="error-text" id="mobile-error"></span>
        </div>

        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input 
            type="email" 
            id="email" 
            placeholder="Enter your email" 
            required 
          />
          <span class="error-text" id="email-error"></span>
        </div>

        <!-- Send OTP Button -->
        <button type="button" id="send-otp-btn" class="btn btn-primary">Send OTP</button>

        <!-- OTP Display Section (Hidden by default) -->
        <div id="otp-display-section" class="otp-display-section hidden">
          <div class="otp-display">
            <p class="otp-label">Your OTP:</p>
            <div class="otp-box" id="otp-display">------</div>
            <p class="otp-hint">OTP displayed above for demo purposes</p>
          </div>
        </div>

        <!-- OTP Input Section (Hidden by default) -->
        <div id="otp-input-section" class="otp-input-section hidden">
          <!-- OTP Input Field -->
          <div class="form-group">
            <label for="otp-input">Enter OTP *</label>
            <input 
              type="text" 
              id="otp-input" 
              placeholder="Enter 6-digit OTP" 
              maxlength="6" 
              required 
            />
            <span class="error-text" id="otp-error"></span>
          </div>

          <!-- Verify OTP Button -->
          <button type="button" id="verify-otp-btn" class="btn btn-success">Verify OTP</button>

          <!-- Resend OTP Link -->
          <p class="resend-otp">
            Didn't receive OTP? 
            <button type="button" id="resend-otp-btn" class="link-button">Resend</button>
          </p>
        </div>
      </form>

      <!-- Footer -->
      <p class="login-footer">
        Secure login using OTP verification
      </p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
